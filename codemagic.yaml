workflows:
  ios-unsigned:
    name: iOS Unsigned Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          cd expense_pro && flutter packages pub get
      - name: Install CocoaPods dependencies
        script: |
          cd expense_pro/ios && pod install
      - name: Flutter build (no code sign)
        script: |
          cd expense_pro && flutter build ios --release --no-codesign
      - name: Package unsigned IPA
        script: |
          cd expense_pro
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/Runner.app
          zip -r app-unsigned.ipa Payload
    artifacts:
      - expense_pro/app-unsigned.ipa
